general:
  startup_commands: ['shell-exec zebar']
  shutdown_commands: ['shell-exec taskkill /IM zebar.exe /F']
  config_reload_commands: []
  focus_follows_cursor: true
  toggle_workspace_on_refocus: false

  cursor_jump:
    enabled: true
    trigger: 'monitor_focus'

  hide_method: 'cloak'
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  inner_gap: '2px'
  outer_gap:
    top: '40px'
    right: '0px'
    bottom: '0px'
    left: '0px'

window_effects:
  focused_window:
    border:
      enabled: true
      color: '#800080'
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: 'square'
    transparency:
      enabled: false
      opacity: '95%'

  other_windows:
    border:
      enabled: true
      color: '#a1a1a1'
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: 'square'
    transparency:
      enabled: false
      opacity: '0%'

window_behavior:
  initial_state: 'tiling'
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:  
  # Monitor 0 workspaces  
  - name: '1'  
    bind_to_monitor: 0  
    keep_alive: true  
  - name: '2'  
    bind_to_monitor: 0  
  - name: '3'  
    bind_to_monitor: 0  
  - name: '4'  
    bind_to_monitor: 0  
  - name: '5'  
    bind_to_monitor: 0  
  - name: '6'  
    bind_to_monitor: 1  
  - name: '7'  
    bind_to_monitor: 1  
  - name: '8'  
    bind_to_monitor: 1  
  - name: '9'  
    bind_to_monitor: 1  
  - name: '0'  
    bind_to_monitor: 1  


  # Monitor 1 workspaces  
  #- name: "10"  
  #  display_name: "1"  
